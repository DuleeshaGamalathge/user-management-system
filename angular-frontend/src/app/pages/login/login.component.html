<div class="container mt-4">
    <h3>Login</h3>
  
    <input class="form-control mb-2"
           type="email"
           [(ngModel)]="email"
           placeholder="Email">
  
    <input class="form-control mb-2"
           type="password"
           [(ngModel)]="password"
           placeholder="Password">
  
    <button class="btn btn-primary" (click)="login()">Login</button>
  
    <div class="text-danger mt-2" *ngIf="error">
      {{ error }}
    </div>
</div>
